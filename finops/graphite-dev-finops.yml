description: >-
  FinOps view of Graphite spend. Graphite bills on a per-seat subscription
  basis rather than usage-based metering: a free Hobby plan, Starter at $20
  per user/month and Team at $40 per user/month (both billed annually), and a
  custom-priced Enterprise plan. AI Reviews and Graphite Chat (Agent / Diamond)
  are bundled into the seat price, limited on Hobby and unlimited on Team, so
  the primary cost lever is active seat count and tier.
notes: >-
  Per-seat prices reflect annual billing; verify current rates and any monthly
  option on the Graphite pricing page during reconciliation. Graphite does not
  publish usage-metered API pricing.
sources:
- https://graphite.com/pricing
- https://graphite.com/docs/billing-plans
- https://graphite.com/docs/graphite-admin
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Graphite
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Graphite
  ServiceCategory: Developer Tools
  ProviderName: Graphite
  PublisherName: Graphite
  InvoiceIssuerName: Graphite
