meters:
- name: active_seats
  description: Active paid user seats per tier (Starter / Team), billed per user/month.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_reviews
  description: Graphite Agent / Diamond AI reviews; limited on Hobby, unlimited on Team (bundled, not metered).
  unit: reviews
  aggregation: sum
  dimensions:
  - account
  - plan
- name: graphite_chat
  description: Graphite Chat / Agent conversations; limited on Hobby, unlimited on Team (bundled, not metered).
  unit: chats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: merge_queue_runs
  description: Pull requests batched and tested through the Graphite merge queue (drives CI cost, not a Graphite line item).
  unit: pull_requests
  aggregation: sum
  dimensions:
  - account
  - repository
principles:
- name: Visibility
  description: Track active seat count and tier per organization via the Graphite admin / billing pages.
- name: Allocation
  description: Allocate seats to teams; map paid seats to internal engineering cost centers.
- name: Optimization
  description: Right-size seats to active reviewers, reclaim inactive seats, and choose the tier (Starter vs. Team) that matches AI review / merge queue needs.
- name: Accountability
  description: Assign a billing owner; review seat count and tier against budget; note that merge queue activity drives downstream CI spend.
maintainers:
